{% extends 'base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1>{{ post.title }}</h1>
            <small class="text-muted">{{ post.created_at|date:"F d, Y" }}</small>
            {% if post.image %}
            <img src="{{ post.image.url }}" class="img-fluid my-3" alt="{{ post.title }}">
            {% endif %}
            <div class="mt-4">
                {{ post.content|linebreaks }}
            </div>
            <a href="{% url 'blog_list' %}" class="btn btn-secondary mt-4">Back to Blog</a>
        </div>
    </div>
</div>
{% endblock %}
